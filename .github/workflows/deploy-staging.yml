name: Deploy to v4.stage.dydx.exchange

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - name: Set up pnpm
        uses: dydxprotocol/setup-pnpm@3bcbd1d6c86dd1b0bce6d5309bf19fb95282f8ac # v2.0.0

      - name: Set up Node
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3.9.1
        with:
          node-version: 18
          registry-url: https://registry.npmjs.org/
          cache: pnpm

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          pnpm install --loglevel warn

      - name: Build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: |
          pnpm run build --mode staging

      - name: Upload to IPFS via web3.storage
        uses: dydxprotocol/add-to-web3@59774ff5ca3e7fd57fbd25ad62557a408a6122fc # v1
        id: web3storage
        with:
          web3_token: ${{ secrets.WEB3_STORAGE_TOKEN }}
          path_to_add: 'dist'
